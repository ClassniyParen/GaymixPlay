<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Каталог</title>
</head>
<body>
    <ul>
        <li><a href="index.html">Главная</a></li>
        <li><a href="catalog.html">Каталог</a></li>
    </ul>
    <hr>

    <h1>Каталог</h1>

    
    <div class="filter-section">
        <button class="filter-btn" data-category="all">Все игры</button>
        <button class="filter-btn" data-category="shooter">Шутеры</button>
        <button class="filter-btn" data-category="rpg">RPG</button>
        <button class="filter-btn" data-category="action">Экшн</button>
    </div>

    
    <div class="product-card" data-category="shooter">
        <h3>DOOM Eternal</h3>
        <img src="images/item1.jpg" alt="DOOM Eternal" width="200">
        <br>
        <p class="price">Цена: 1999 ₽</p>
        <button class="add-to-cart" data-id="1">Добавить в корзину</button>
        <br>
        <a href="item.html">Подробнее</a>
        <br><br>
    </div>

    
    <div class="product-card" data-category="rpg">
        <h3>Horizon Zero Dawn</h3>
        <img src="images/item2.jpg" alt="Horizon Zero Dawn" width="200">
        <br>
        <p class="price">Цена: 1499 ₽</p>
        <button class="add-to-cart" data-id="2">Добавить в корзину</button>
        <br>
        <a href="item2.html">Подробнее</a>
        <br><br>
    </div>

    
    <div class="product-card" data-category="action">
        <h3>GTA</h3>
        <img src="images/item3.jpg" alt="GTA" width="200">
        <br>
        <p class="price">Цена: 2499 ₽</p>
        <button class="add-to-cart" data-id="3">Добавить в корзину</button>
        <br>
        <a href="item3.html">Подробнее</a>
    </div>

   
    <div class="cart-section">
        <h2>🛒 Корзина</h2>
        <div id="cart-items">
            <p>Корзина пуста</p>
        </div>
        <div id="cart-total">Итого: 0 ₽</div>
        <button id="checkout-btn">Оплатить</button>
    </div>

    <hr>
    <footer>
        &copy; Все права защищены
    </footer>

    
    <script src="script.js"></script>

</body>
</html>
